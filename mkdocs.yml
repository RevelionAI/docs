site_name: Revelion Docs
site_url: https://docs.revelion.ai/
site_description: Documentation for Revelion — The Autonomous AI PenTester. AI agents that perform real penetration testing with proof-of-concept evidence.
site_author: Revelion Limited
repo_url: https://github.com/RevelionAI/docs
repo_name: RevelionAI/docs

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: red
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/twitter
      link: https://x.com/revelionai
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/revelion-ai/
    - icon: fontawesome/brands/discord
      link: https://discord.gg/fg6JS7Xz
    - icon: fontawesome/brands/github
      link: https://github.com/RevelionAI
  generator: false

copyright: "&copy; 2026 Revelion Limited &mdash; <a href='https://www.revelion.ai'>revelion.ai</a>"

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/index.md
    - System Requirements: getting-started/requirements.md
    - Installation: getting-started/installation.md
    - Your First Mission: getting-started/first-mission.md
  - Platform:
    - Overview: platform/overview.md
    - How It Works: platform/how-it-works.md
    - Features: platform/features.md
    - Architecture: platform/architecture.md
    - Tools: platform/tools.md
    - Reports: platform/reports.md
  - Guides:
    - Scope Configuration: guides/scope-configuration.md
    - Human-In-The-Loop: guides/human-in-the-loop.md
    - VPN Tunnelling: guides/vpn-tunnelling.md
    - Scheduled Scans: guides/scheduled-scans.md
    - Compliance Frameworks: guides/compliance-frameworks.md
    - Report Branding: guides/report-branding.md
  - For MSPs:
    - Overview: for-msps/index.md
    - Client Management: for-msps/client-management.md
    - Client Portal: for-msps/client-portal.md
    - White-Label: for-msps/white-label.md
  - Pricing: pricing/index.md
  - Security:
    - Trust & Security: security/index.md
    - Data Handling: security/data-handling.md
    - GDPR: security/gdpr.md
    - Legal: security/legal.md
  - FAQ: faq.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
